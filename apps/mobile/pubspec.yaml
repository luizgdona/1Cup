name: one_cup
description: "1Cup — Gamified specialty coffee social network"
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: '>=3.5.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # HTTP
  dio: ^5.7.0

  # Secure token storage
  flutter_secure_storage: ^9.2.2

  # State management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Navigation
  go_router: ^14.6.1

  # Images
  cached_network_image: ^3.4.1
  image_picker: ^1.1.2

  # Location
  geolocator: ^13.0.2

  # Animations
  flutter_animate: ^4.5.0

  # i18n
  intl: ^0.19.0

  # Immutable models
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0

  # Local prefs (theme)
  shared_preferences: ^2.3.3

  # Typography
  google_fonts: ^6.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  build_runner: ^2.4.13
  freezed: ^2.5.7
  riverpod_generator: ^2.6.3
  json_serializable: ^6.8.0
  mocktail: ^1.0.4

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/

  # Fonts loaded via google_fonts package — no local font files needed
