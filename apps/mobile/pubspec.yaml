name: one_cup
description: "1Cup — Gamified specialty coffee social network"
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: '>=3.5.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # HTTP
  dio: ^5.7.0

  # Secure token storage
  flutter_secure_storage: ^9.2.2

  # State management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Navigation
  go_router: ^14.6.1

  # Images
  cached_network_image: ^3.4.1
  image_picker: ^1.1.2

  # Location
  geolocator: ^13.0.2

  # Animations
  flutter_animate: ^4.5.0

  # i18n
  intl: ^0.19.0

  # Immutable models
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0

  # Local prefs (theme)
  shared_preferences: ^2.3.3

  # Typography
  google_fonts: ^6.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  build_runner: ^2.4.13
  freezed: ^2.5.7
  riverpod_generator: ^2.6.3
  json_serializable: ^6.8.0
  mocktail: ^1.0.4

  # Generates the native launcher icons from assets/branding/ — build-time only
  flutter_launcher_icons: ^0.14.1

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/

  # Fonts loaded via google_fonts package — no local font files needed

# Launcher icon generation. Sources live in assets/branding/, which is
# deliberately NOT listed under `assets:` above — those files are only read by
# the generator at build time and would otherwise be bundled into the APK for
# nothing. Regenerate with: dart run flutter_launcher_icons
flutter_launcher_icons:
  android: true
  ios: false
  image_path: assets/branding/app_icon.png
  # Adaptive icon: the foreground is the cup glyph on transparency, and the
  # background is the design system's dark `surface` token, so the knocked-out
  # "1" reads exactly as it does in the source artwork.
  adaptive_icon_background: "#1C1A18"
  adaptive_icon_foreground: assets/branding/app_icon_foreground.png
  min_sdk_android: 24
