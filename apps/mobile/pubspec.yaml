name: one_cup
description: "1Cup — Rede social gamificada de consumo de café"
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: '>=3.4.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # HTTP
  dio: ^5.4.0

  # Armazenamento seguro de tokens
  flutter_secure_storage: ^9.0.0

  # State management
  flutter_riverpod: ^2.5.0
  riverpod_annotation: ^2.3.0

  # Navegação
  go_router: ^13.0.0

  # Imagens
  cached_network_image: ^3.3.1
  image_picker: ^1.1.0

  # Localização
  geolocator: ^12.0.0

  # Animações
  flutter_animate: ^4.5.0

  # i18n e formatação
  intl: ^0.19.0

  # Modelos imutáveis
  freezed_annotation: ^2.4.0
  json_annotation: ^4.9.0

  # Preferências locais (tema)
  shared_preferences: ^2.2.0

  # Tipografia
  google_fonts: ^6.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.0
  freezed: ^2.5.0
  riverpod_generator: ^2.4.0
  json_serializable: ^6.7.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/

  fonts:
    - family: HankenGrotesk
      fonts:
        - asset: assets/fonts/HankenGrotesk-Regular.ttf
        - asset: assets/fonts/HankenGrotesk-Medium.ttf
          weight: 500
        - asset: assets/fonts/HankenGrotesk-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/HankenGrotesk-Bold.ttf
          weight: 700
