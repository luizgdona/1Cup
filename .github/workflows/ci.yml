name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  # ── Backend — Typecheck + Tests ────────────────────────────
  backend:
    name: Backend — Typecheck & Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/backend

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js 26
        uses: actions/setup-node@v4
        with:
          node-version: '26'

      - name: Install dependencies
        run: npm install

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Typecheck
        run: npm run typecheck

      - name: Unit tests (no DB required)
        run: SKIP_DB_TESTS=true npm test

  # ── Backend — Integration Tests (real Postgres + Redis) ───
  backend-integration:
    name: Backend — Integration Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/backend
    env:
      # Must match src/__tests__/setup.ts so vitest and prisma agree.
      DATABASE_URL: postgresql://test:test@localhost:5432/test
      REDIS_URL: redis://localhost:6379

    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U test -d test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:8-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js 26
        uses: actions/setup-node@v4
        with:
          node-version: '26'

      - name: Install dependencies
        run: npm install

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Apply schema to test database
        run: npx prisma db push --skip-generate

      - name: Integration + unit tests (DB enabled)
        run: npm test

  # ── Flutter — Analyze & Test ──────────────────────────────
  flutter:
    name: Flutter — Analyze & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/mobile

    steps:
      - uses: actions/checkout@v4

      # Required by the Android Gradle build invoked below (appbundle
      # smoke build). Temurin 17 matches compileOptions/kotlinOptions in
      # android/app/build.gradle.kts.
      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter 3.44
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.0'
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze (errors only)
        run: flutter analyze --no-fatal-warnings --no-fatal-infos

      - name: Unit & widget tests
        run: flutter test

      # Smoke-tests that the Android release build (signing, R8, manifest
      # merge) still succeeds. Signs with the debug key because CI has no
      # key.properties/keystore — see android/app/build.gradle.kts fallback.
      - name: Android release build (appbundle smoke test)
        run: flutter build appbundle --release --dart-define=API_BASE_URL=https://api.1cup.app/api/v1

  # ── Landing Page — Build ──────────────────────────────────
  landing:
    name: Landing — Typecheck & Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/landing

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js 26
        uses: actions/setup-node@v4
        with:
          node-version: '26'

      - name: Install dependencies
        run: npm install

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: https://api.1cup.app/api/v1
