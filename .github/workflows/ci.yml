name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  # ── Backend — Typecheck + Tests ────────────────────────────
  backend:
    name: Backend — Typecheck & Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/backend

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js 26
        uses: actions/setup-node@v4
        with:
          node-version: '26'

      - name: Install dependencies
        run: npm install

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Typecheck
        run: npm run typecheck

      - name: Unit tests (no DB required)
        run: SKIP_DB_TESTS=true npm test

  # ── Flutter — Analyze & Test ──────────────────────────────
  flutter:
    name: Flutter — Analyze & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/mobile

    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter 3.44
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.0'
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze (errors only)
        run: flutter analyze --no-fatal-warnings --no-fatal-infos

      - name: Unit & widget tests
        run: flutter test

  # ── Landing Page — Build ──────────────────────────────────
  landing:
    name: Landing — Typecheck & Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/landing

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js 26
        uses: actions/setup-node@v4
        with:
          node-version: '26'

      - name: Install dependencies
        run: npm install

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: https://api.1cup.app/api/v1
