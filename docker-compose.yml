version: '3.9'

services:
  postgres:
    image: postgres:17-alpine
    container_name: 1cup_postgres
    environment:
      POSTGRES_DB: 1cup_dev
      POSTGRES_USER: 1cup_user
      POSTGRES_PASSWORD: 1cup_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U 1cup_user -d 1cup_dev"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:8-alpine
    container_name: 1cup_redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  postgres_data:
